<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2f57" />
    <title>Quick Admin - DepEd Attendance</title>
    <link rel="stylesheet" href="/styles.css?v=20260310-5" />
  </head>
  <body class="attendance-app sdo-theme admin-app">
    <header class="app-topbar">
      <div class="topbar-left">
        <img src="/icons/sdo-marinduque.jpg" alt="SDO Marinduque" class="topbar-logo" />
        <div>
          <div class="topbar-title">SDO MARINDUQUE</div>
          <div class="topbar-subtitle">Attendance Monitoring System</div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="topbar-pill">Admin Console</span>
      </div>
      <nav class="topbar-nav">
        <a href="#records">Attendance</a>
        <a href="#filters">Filters</a>
        <a href="#reports">Reports</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="card admin-panel">
        <div class="dashboard-header">
          <div>
            <div class="profile-name">Quick Admin</div>
            <p id="adminUserInfo" class="profile-meta">Checking admin session...</p>
          </div>
          <div class="header-actions">
            <a href="/">Back to Attendance</a>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>

        <section class="stat-grid admin-stat">
          <article class="stat-card stat-navy">
            <div>Total Employees</div>
            <h3>--</h3>
          </article>
          <article class="stat-card stat-green">
            <div>Present Today</div>
            <h3>--</h3>
          </article>
          <article class="stat-card stat-red">
            <div>Late</div>
            <h3>--</h3>
          </article>
          <article class="stat-card stat-orange">
            <div>Absent</div>
            <h3>--</h3>
          </article>
        </section>

        <section class="admin-filters" id="filters">
          <label>Date
            <input id="dateFilter" type="date" />
          </label>
          <label>Month (for print)
            <input id="monthFilter" type="month" />
          </label>
          <label>Employee ID (optional)
            <input id="employeeIdFilter" type="text" placeholder="SDO-001" />
          </label>
        </section>

        <div class="actions">
          <button id="loadBtn" type="button">Load All Records</button>
          <button id="summaryBtn" type="button">Load Today Summary</button>
        </div>

        <div class="status" id="status">Status: waiting</div>
        <div class="info" id="info"></div>

        <div class="table-wrap" id="records">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>AM In</th>
                <th>Noon Out</th>
                <th>PM In</th>
                <th>PM Out</th>
                <th>Status</th>
                <th>Photo</th>
                <th>Map</th>
                <th>Print DTR</th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/admin.js?v=20260310-5"></script>
  </body>
</html>
