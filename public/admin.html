<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0056b3" />
    <title>Quick Admin - DepEd Attendance</title>
    <link rel="stylesheet" href="/styles.css?v=20260310-2" />
  </head>
  <body class="attendance-app admin-app">
    <main class="app-shell">
      <aside class="brand-rail">
        <div class="brand-block">
          <img src="/icons/sdo-marinduque.jpg" alt="SDO Marinduque" class="brand-logo" />
          <h1>DepEd Marinduque</h1>
          <p>Quick Admin Console</p>
          <small>Attendance Monitoring and DTR Printing</small>
        </div>
      </aside>

      <section class="workspace admin-workspace">
        <section class="card admin-head-card">
          <div class="admin-head">
            <div>
              <h2>Admin Attendance Dashboard</h2>
              <p id="adminUserInfo">Checking admin session...</p>
            </div>
            <div class="admin-head-actions">
              <a href="/">Back to Attendance</a>
              <button id="logoutBtn" type="button">Logout</button>
            </div>
          </div>
        </section>

        <section class="card admin-filter-card">
          <h3>Filters and Actions</h3>
          <div class="admin-filter-grid">
            <label>Date
              <input id="dateFilter" type="date" />
            </label>
            <label>Month (for print)
              <input id="monthFilter" type="month" />
            </label>
            <label>Employee ID (optional)
              <input id="employeeIdFilter" type="text" placeholder="DEPED-001" />
            </label>
          </div>

          <div class="actions">
            <button id="loadBtn" type="button">Load All Records</button>
            <button id="summaryBtn" type="button">Load Today Summary</button>
          </div>

          <div class="status" id="status">Status: waiting</div>
          <div class="info" id="info"></div>
        </section>

        <section class="card admin-table-card">
          <h3>Attendance Records</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Employee</th>
                  <th>AM In</th>
                  <th>Noon Out</th>
                  <th>PM In</th>
                  <th>PM Out</th>
                  <th>Status</th>
                  <th>Photo</th>
                  <th>Map</th>
                  <th>Print DTR</th>
                </tr>
              </thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/admin.js?v=20260309-8"></script>
  </body>
</html>
